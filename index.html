<!DOCTYPE html>
<html lang="fa" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>میدان مردم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&family=Lalezar&display=swap" rel="stylesheet">
    <script>
        tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{'lalezar':['Lalezar','display'],'vazir':['Vazirmatn','sans-serif'],'inter':['Inter','sans-serif']}}}}
    </script>
    <style>
        :root{--tx:#e8e8e8;--tx2:#aaa;--tx3:#555;--glass:rgba(15,15,15,.65);--glass-bd:rgba(255,255,255,.05);--glow:rgba(35,159,64,.3)}
        html.light{--tx:#1a1a1a;--tx2:#666;--tx3:#aaa;--glass:rgba(255,255,255,.5);--glass-bd:rgba(0,0,0,.06);--glow:rgba(35,159,64,.18)}

        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Vazirmatn',sans-serif;background:#050505;color:var(--tx);overflow-x:hidden;transition:background .6s,color .4s}
        html.light body{background:#f0efeb}
        html[lang="en"] body{font-family:'Inter','Lalezar',sans-serif}

        /* ===== Background ===== */
        .bg-flag{position:fixed;inset:0;z-index:0;pointer-events:none}
        .bg-flag img{width:100%;height:100%;object-fit:cover;opacity:.04;filter:blur(2px) saturate(.3)}
        html.light .bg-flag img{opacity:.035;filter:blur(3px) saturate(.2)}
        .bg-ambient{position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(ellipse 60% 40% at 50% 20%,rgba(35,159,64,.07),transparent 70%),
                radial-gradient(ellipse 60% 40% at 50% 80%,rgba(218,0,0,.05),transparent 70%)}
        html.light .bg-ambient{background:
            radial-gradient(ellipse 60% 40% at 50% 20%,rgba(35,159,64,.035),transparent 70%),
            radial-gradient(ellipse 60% 40% at 50% 80%,rgba(218,0,0,.025),transparent 70%)}
        .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.025) 1px,transparent 0);
            background-size:50px 50px}
        html.light .bg-grid{background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.035) 1px,transparent 0)}
        #ptc{position:fixed;inset:0;z-index:1;pointer-events:none}
        .mglow{position:fixed;width:400px;height:400px;border-radius:50%;
            background:radial-gradient(circle,rgba(35,159,64,.06),transparent 70%);
            transform:translate(-50%,-50%);pointer-events:none;z-index:1;
            transition:left .2s ease-out,top .2s ease-out}
        html.light .mglow{background:radial-gradient(circle,rgba(35,159,64,.035),transparent 70%)}

        /* ===== Glass ===== */
        .glass{background:var(--glass);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid var(--glass-bd);transition:all .5s}

        /* ===== Flag Display ===== */
        .flag-frame{position:relative;border-radius:18px;overflow:hidden;
            box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04),0 0 80px rgba(35,159,64,.08);
            transition:box-shadow .5s}
        html.light .flag-frame{box-shadow:0 20px 60px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.05)}
        .flag-frame img{display:block;width:100%;height:auto;position:relative;z-index:1}
        .flag-frame::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
            background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.12) 48%,rgba(255,255,255,.12) 52%,transparent 65%);
            background-size:300% 100%;animation:flagShim 4s ease-in-out infinite}
        @keyframes flagShim{0%{background-position:-300% 0}100%{background-position:300% 0}}
        .flag-frame::before{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
            background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.08) 100%);border-radius:18px}

        /* ===== Float ===== */
        @keyframes floatY{0%,100%{transform:perspective(800px) rotateY(-3deg) rotateX(2deg) translateY(0)}50%{transform:perspective(800px) rotateY(-3deg) rotateX(2deg) translateY(-14px)}}
        .float-f{animation:floatY 7s ease-in-out infinite}

        /* ===== Counter ===== */
        .c-num{font-family:'Lalezar',display;font-size:clamp(100px,22vw,200px);font-weight:400;line-height:1;
            font-variant-numeric:tabular-nums;color:var(--tx);transition:color .4s}
        .c-glow{text-shadow:0 0 60px var(--glow),0 0 140px var(--glow);animation:pG 4s ease-in-out infinite}
        @keyframes pG{0%,100%{filter:brightness(1)}50%{filter:brightness(1.08)}}
        .c-pop{animation:popI .55s cubic-bezier(.34,1.56,.64,1)}
        @keyframes popI{0%{transform:scale(1.2);opacity:.5}100%{transform:scale(1);opacity:1}}

        /* ===== Theme Toggle ===== */
        .tbtn{width:56px;height:30px;border-radius:15px;background:#222;border:1px solid rgba(255,255,255,.06);cursor:pointer;position:relative;transition:all .4s}
        html.light .tbtn{background:#ddd;border-color:rgba(0,0,0,.06)}
        .tth{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#1a1a2e;
            display:flex;align-items:center;justify-content:center;transition:all .5s cubic-bezier(.68,-.4,.27,1.4);
            box-shadow:0 2px 8px rgba(0,0,0,.4)}
        html.light .tth{transform:translateX(26px);background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1)}

        /* ===== Lang ===== */
        .lbtn{padding:5px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;
            color:#555;background:transparent;border:1px solid transparent;transition:all .3s;font-family:'Lalezar',display}
        html.dark .lbtn{color:#555}
        .lbtn.act{color:var(--tx);background:var(--glass);border-color:var(--glass-bd)}

        /* ===== Link Cards ===== */
        .lk{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 14px;border-radius:16px;
            cursor:pointer;text-decoration:none;color:var(--tx);position:relative;overflow:hidden;
            transition:all .45s cubic-bezier(.2,.8,.2,1);
            background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.035);
            backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
        html.light .lk{background:rgba(255,255,255,.4);border-color:rgba(0,0,0,.04)}
        .lk::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(35,159,64,.1),rgba(218,0,0,.06));opacity:0;transition:opacity .3s}
        .lk:hover{transform:translateY(-8px) scale(1.05);box-shadow:0 24px 60px rgba(35,159,64,.15);border-color:rgba(35,159,64,.2)}
        html.light .lk:hover{box-shadow:0 16px 40px rgba(0,0,0,.08)}
        .lk:hover::after{opacity:1}
        .lk>*{position:relative;z-index:1}
        .lk img{width:34px;height:34px;border-radius:10px;transition:transform .3s}
        .lk:hover img{transform:scale(1.2) rotate(-3deg)}

        /* Tooltip */
        .tip{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(8px);
            padding:8px 18px;border-radius:12px;background:var(--tx);color:var(--bg,#050505);
            font-size:12px;font-weight:700;white-space:nowrap;opacity:0;pointer-events:none;
            transition:all .35s cubic-bezier(.2,.8,.2,1);z-index:30;font-family:'Lalezar',display}
        html.light .tip{color:#f0efeb}
        .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--tx)}
        .lk:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}

        /* ===== Fade Up ===== */
        .fu{opacity:0;transform:translateY(45px);filter:blur(14px);animation:fu .9s cubic-bezier(.2,.8,.2,1) forwards}
        @keyframes fu{to{opacity:1;transform:translateY(0);filter:blur(0)}}
        .d1{animation-delay:.05s}.d2{animation-delay:.18s}.d3{animation-delay:.35s}.d4{animation-delay:.55s}.d5{animation-delay:.75s}.d6{animation-delay:.95s}.d7{animation-delay:1.15s}

        /* Divider */
        .dvd{height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.05),transparent)}
        html.light .dvd{background:linear-gradient(to right,transparent,rgba(0,0,0,.05),transparent)}

        /* Scrollbar */
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
        html.light ::-webkit-scrollbar-thumb{background:#ccc}

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
    </style>
</head>
<body class="min-h-screen relative">

<!-- Background Layers -->
<div class="bg-flag"><img src="./iran.jpg" alt="" aria-hidden="true"></div>
<div class="bg-ambient"></div>
<div class="bg-grid"></div>
<canvas id="ptc"></canvas>
<div class="mglow" id="mg"></div>

<!-- Content -->
<div class="relative z-10 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="flex items-center justify-between px-5 sm:px-8 py-4 fu d1">

            <div class="tth">
                <span class="iconify" id="sunI" data-icon="ph:sun-bold" style="color:#f59e0b;font-size:13px;display:none"></span>
                <span class="iconify" id="moonI" data-icon="ph:moon-bold" style="color:#a78bfa;font-size:13px"></span>
            </div>
        </button>
        <div class="flex items-center gap-1 rounded-xl p-1" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04)">
            <button class="lbtn act" data-lang="fa" onclick="setLang('fa')">FA</button>
            <button class="lbtn" data-lang="ar" onclick="setLang('ar')">AR</button>
            <button class="lbtn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex flex-col items-center justify-center px-5 py-6">

        <!-- Flag -->
        <div class="fu d2 mb-10">
            <div class="float-f">
                <div class="flag-frame" style="width:280px">
                    <img src="https://z-cdn-media.chatglm.cn/files/0ea1c7b9-64a1-4262-847e-2ea2ccd6d033.jpg?auth_key=1882991273-6a9424108a2047a4b826e77a9c214471-0-f715bd929216489dcc77f8de796d1c54" alt="پرچم جمهوری اسلامی ایران" onerror="this.parentElement.innerHTML='<div style=\'width:280px;height:187px;background:linear-gradient(to bottom,#239f40 33%,#fff 33%,#fff 66%,#da0000 66%);border-radius:18px;display:flex;align-items:center;justify-content:center\'><svg width=\'40\' height=\'48\' viewBox=\'0 0 100 112\'><path d=\'M50 6C50 6 26 28 26 56C26 80 50 100 50 106C50 100 74 80 74 56C74 28 50 6 50 6Z\' fill=\'#da0000\'/><path d=\'M50 20C50 20 36 34 36 54C36 70 50 84 50 88C50 84 64 70 64 54C64 34 50 20 50 20Z\' fill=\'#239f40\'/><line x1=\'50\' y1=\'30\' x2=\'50\' y2=\'96\' stroke=\'#fff\' stroke-width=\'3\'/><circle cx=\'50\' cy=\'55\' r=\'10\' fill=\'none\' stroke=\'#fff\' stroke-width=\'2\'/></svg></div>'">
                </div>
            </div>
        </div>

        <!-- Title -->
        <h1 id="title" class="fu d3 text-4xl sm:text-5xl md:text-6xl tracking-tight mb-5 text-center" style="font-family:'Lalezar',display">میدان مردم</h1>

        <!-- Counter -->
        <div class="fu d4 flex flex-col items-center mb-8">
            <div class="c-num c-glow" id="ctr">۰</div>
            <span id="cLbl" class="mt-3 text-lg sm:text-xl tracking-wide" style="font-family:'Lalezar',display;color:var(--tx2)">روز در میدان</span>
        </div>

        <!-- Date/Time -->
        <div class="fu d5 glass rounded-2xl px-6 py-4 mb-6 text-center">
            <div class="flex items-center gap-2.5 text-sm" style="color:var(--tx2)">
                <span class="iconify" data-icon="ph:calendar-blank" style="font-size:16px;color:var(--tx3)"></span>
                <span id="dateD">...</span>
                <span style="color:var(--tx3)">•</span>
                <span id="timeD" style="color:var(--tx3);font-variant-numeric:tabular-nums">...</span>
                <span style="color:var(--tx3)">–</span>
                <span id="tzD" style="color:var(--tx3)">تهران</span>

                <span id="sVal" class="font-bold" style="color:var(--tx2)">۷ اسفند ۱۴۰۴</span>
            </p>
            <p class="text-sm leading-relaxed max-w-sm mx-auto" style="color:var(--tx3)">
                <span id="eLbl">پایان:</span>
                <span id="eVal" class="font-bold" style="color:var(--tx2)">تا هر وقت که آیت‌الله سید مجتبی خامنه‌ای امر کنند</span>
            </p>
        </div>

        <!-- Divider -->
        <div class="dvd w-52 mb-8 fu d7"></div>

        <!-- Related Sites -->
        <div class="fu d7 w-full max-w-md">
            <p id="rLbl" class="text-center text-xs font-bold uppercase tracking-[.15em] mb-6" style="color:var(--tx3)">سایت‌های مرتبط</p>
            <div class="grid grid-cols-4 gap-3">
                <!-- Eitaa -->
                <a href="https://eitaa.com/rahbar_enghelab_ir" target="_blank" rel="noopener" class="lk">
                    <div class="tip" id="tE">کانال ایتا</div>
                    <img src="https://www.google.com/s2/favicons?domain=eitaa.com&sz=64" alt="ایتا" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="w-[34px] h-[34px] rounded-[10px] items-center justify-center" style="display:none;background:rgba(35,159,64,.12)">
                        <span class="iconify" data-icon="ph:chat-circle-dots-fill" style="color:#239f40;font-size:20px"></span>
                    </div>
                    <span class="ln text-xs" style="font-family:'Lalezar',display;color:var(--tx3)">ایتا</span>
                </a>
                <!-- Bale -->
                <a href="https://ble.ir/rahbar_enghelab_ir" target="_blank" rel="noopener" class="lk">
                    <div class="tip" id="tB">کانال بله</div>
                    <img src="https://www.google.com/s2/favicons?domain=bale.ai&sz=64" alt="بله" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="w-[34px] h-[34px] rounded-[10px] items-center justify-center" style="display:none;background:rgba(218,0,0,.12)">
                        <span class="iconify" data-icon="ph:chat-circle-text-fill" style="color:#da0000;font-size:20px"></span>
                    </div>
                    <span class="ln text-xs" style="font-family:'Lalezar',display;color:var(--tx3)">بله</span>
                </a>
                <!-- Janfada -->
                <a href="https://janfadaa.ir" target="_blank" rel="noopener" class="lk">
                    <div class="tip" id="tJ">سایت جانفدا</div>
                    <img src="https://janfadaa.ir/assets/logo_color-v0Dnuu8D.png&sz=64" alt="جانفدا" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="w-[34px] h-[34px] rounded-[10px] items-center justify-center" style="display:none;background:rgba(245,158,11,.12)">
                        <span class="iconify" data-icon="ph:globe-fill" style="color:#f59e0b;font-size:20px"></span>
                    </div>
                    <span class="ln text-xs" style="font-family:'Lalezar',display;color:var(--tx3)">جانفدا</span>
                </a>
                <!-- Khamenei -->
                <a href="https://khamenei.ir" target="_blank" rel="noopener" class="lk">
                    <div class="tip" id="tK">سایت مقام معظم رهبری</div>
                    <img src="https://khamenei.ir/assets/logo.svg&sz=64" alt="رهبری" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="w-[34px] h-[34px] rounded-[10px] items-center justify-center" style="display:none;background:rgba(16,185,129,.12)">
                        <span class="iconify" data-icon="ph:crown-fill" style="color:#10b981;font-size:20px"></span>
                    </div>
                    <span class="ln text-xs" style="font-family:'Lalezar',display;color:var(--tx3)">رهبری</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-5 fu d7">
        <span id="fTxt" class="text-xs font-medium" style="color:var(--tx3)">میدان مردم — پایگاه اطلاع‌رسانی</span>
    </footer>
</div>

<script>
/* ===== Jalali ===== */

function renderCtr(target){var dur=2600,st=performance.now(),fr=aVal;
(function step(now){var p=Math.min((now-st)/dur,1),e=p===1?1:1-Math.pow(2,-12*p),v=Math.round(fr+(target-fr)*e);aVal=v;
document.getElementById('ctr').textContent=toL(v,lang);if(p<1)requestAnimationFrame(step)})(st)}

/* ===== DateTime ===== */
function getTN(){var n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*6e4+3.5*36e5)}
function updateDT(){var tn=getTN(),j=g2j(tn.getFullYear(),tn.getMonth()+1,tn.getDate()),t=T[lang];
var di=lang==='en'?tn.getDay():(tn.getDay()+1)%7;
var ds=lang==='en'?t.dw[di]+', '+t.mn[j[1]-1]+' '+toL(j[2],lang)+', '+toL(j[0],lang):t.dw[di]+' '+toL(j[2],lang)+' '+t.mn[j[1]-1]+' '+toL(j[0],lang);
document.getElementById('dateD').textContent=ds;
var h=String(tn.getHours()).padStart(2,'0'),m=String(tn.getMinutes()).padStart(2,'0'),s=String(tn.getSeconds()).padStart(2,'0');
document.getElementById('timeD').textContent=toL(h+':'+m+':'+s,lang)}

/* ===== Particles ===== */
function initP(){var c=document.getElementById('ptc'),ctx=c.getContext('2d'),ps=[];
function rz(){c.width=innerWidth;c.height=innerHeight}rz();addEventListener('resize',rz);
function P(){this.rs=function(){this.x=Math.random()*c.width;this.y=c.height+Math.random()*100;this.r=Math.random()*1.5+.3;this.vy=-(Math.random()*.28+.06);this.vx=(Math.random()-.5)*.1;this.a=Math.random()*.4+.12;this.da=Math.random()*.001+.0003};
this.rs();this.up=function(){this.y+=this.vy;this.x+=this.vx;this.a-=this.da;if(this.a<=0||this.y<-20)this.rs()};
this.dr=function(){var dk=document.documentElement.classList.contains('dark');ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(35,159,64,'+(this.a*(dk?.3:.15))+')';ctx.fill()}}
for(var i=0;i<45;i++){var p=new P();p.y=Math.random()*c.height;ps.push(p)}
(function loop(){ctx.clearRect(0,0,c.width,c.height);for(var i=0;i<ps.length;i++){ps[i].up();ps[i].dr()}requestAnimationFrame(loop)})()}

/* ===== Mouse Glow ===== */
document.addEventListener('mousemove',function(e){var g=document.getElementById('mg');g.style.left=e.clientX+'px';g.style.top=e.clientY+'px'});

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded',function(){
    initP();updateDT();renderCtr(127);
    setInterval(updateDT,1000);
});
</script>
</body>
